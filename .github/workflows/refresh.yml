name: Refresh Dashboard

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: mic-led/semca-enrollment-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: JotForm_Data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync JotForm data and patch dashboard
        env:
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_TEAM_ID: ${{ secrets.JOTFORM_TEAM_ID }}
          JOTFORM_CSV_DIR: ./JotForm_Data
          JOTFORM_SUMMARY_PATH: ./jotform_summary.json
        run: python patch_data.py

      - name: Commit updated CSVs to data repo
        run: |
          cd JotForm_Data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync JotForm data [$(date -u '+%Y-%m-%d')]"
          git push

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SEMCA_Enrollment_Analysis.html
          git diff --staged --quiet || git commit -m "Auto-refresh dashboard [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push
