name: Refresh Dashboard

on:
  schedule:
    - cron: '0 10 * * *'   # Daily at 10 AM UTC (6 AM Eastern)
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

# Explicit write access so the bot can push the updated HTML and GitHub Pages can deploy
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync JotForm data
        env:
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_TEAM_ID: ${{ secrets.JOTFORM_TEAM_ID }}
          JOTFORM_CSV_DIR: ./JotForm_Data
          JOTFORM_SUMMARY_PATH: ./jotform_summary.json
        run: python jotform_sync.py

      - name: Patch dashboard data
        env:
          JOTFORM_CSV_DIR: ./JotForm_Data
        run: python patch_data.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SEMCA_Enrollment_Analysis.html
          git diff --staged --quiet || git commit -m "Auto-refresh dashboard [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push
